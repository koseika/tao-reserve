<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>タオタントラセッション ご予約</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="label">タオタントラセッション</p>
      <h1>ご予約</h1>
      <p class="message">今のあなたに合うタイミングを、<br>お選びください。</p>
    </section>

    <section class="calendar-card" aria-label="予約カレンダー">
      <div class="calendar-header">
        <button id="prevMonth" class="month-button" type="button" aria-label="前の月">←</button>
        <h2 id="currentMonth"></h2>
        <button id="nextMonth" class="month-button" type="button" aria-label="次の月">→</button>
      </div>

      <div class="weekdays">
        <span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span><span>日</span>
      </div>

      <div id="calendar" class="calendar"></div>

      <div class="legend">
        <p><span class="mark available">○</span> ご予約可能</p>
        <p><span class="mark unavailable">×</span> ご予約不可</p>
      </div>
    </section>

    <section id="timePanel" class="time-panel hidden" aria-live="polite">
      <h3 id="selectedDateTitle"></h3>
      <p class="time-note">ご希望の開始時間をお選びください。</p>
      <div id="timeButtons" class="time-buttons"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
