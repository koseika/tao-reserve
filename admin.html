<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tao Reserve 管理画面</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<main class="page admin-page">
  <section class="hero">
    <p class="label">Tao Reserve</p>
    <h1>管理画面</h1>
    <p class="message">Googleログイン後、<br>予約設定と空き状況を保存します。</p>
  </section>

  <section id="loginCard" class="login-card">
    <h2 class="month-title">管理者ログイン</h2>
    <p class="message">管理画面を使うには、Googleアカウントでログインしてください。</p>
    <button id="popupLoginButton" class="primary-button" type="button">Googleでログイン</button>
    <button id="redirectLoginButton" class="secondary-button" type="button">ログインできない時はこちら</button>
    <p id="loginStatus" class="status-message"></p>
  </section>

  <section id="adminContent" class="hidden">
    <section class="admin-card">
      <h2 class="month-title">予約設定</h2>

      <div class="setting-grid">
        <div class="setting-row">
          <label for="reservationNoticeDays">何日後から予約可能</label>
          <input id="reservationNoticeDays" type="number" min="0" max="30" value="2">
        </div>

        <div class="setting-row">
          <label for="displayMonths">表示する月数</label>
          <input id="displayMonths" type="number" min="1" max="6" value="2">
        </div>

        <div class="setting-row">
          <label for="startTime">開始時間</label>
          <input id="startTime" type="time" value="15:00">
        </div>

        <div class="setting-row">
          <label for="endTime">終了時間</label>
          <input id="endTime" type="time" value="19:00">
        </div>

        <div class="setting-row">
          <label for="intervalMinutes">予約間隔</label>
          <select id="intervalMinutes">
            <option value="30">30分</option>
            <option value="60" selected>60分</option>
          </select>
        </div>
      </div>

      <p class="note">例：2日後から予約可能にすると、当日と翌日は自動的に×になります。</p>
    </section>

    <section class="admin-card">
      <h2 class="month-title">今月・来月の受付設定</h2>
      <p class="status-message">休みにしたい日は「休み」にチェック。17時以降だけ受けたい日は15時・16時を外してください。</p>
      <div id="adminList"></div>
    </section>

    <div class="actions">
      <button class="primary-button" id="saveButton" type="button">Firebaseに保存する</button>
      <button class="secondary-button" id="logoutButton" type="button">ログアウト</button>
      <p id="statusMessage" class="status-message"></p>
    </div>
  </section>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { getFirestore, doc, getDoc, writeBatch, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
import { firebaseConfig, ADMIN_EMAIL } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();
provider.setCustomParameters({ prompt:"select_account" });
await setPersistence(auth, browserLocalPersistence);

const DEFAULT_SETTINGS = {
  reservationNoticeDays: 2,
  displayMonths: 2,
  startTime: "15:00",
  endTime: "19:00",
  intervalMinutes: 60
};

let settings = { ...DEFAULT_SETTINGS };

const loginCard = document.getElementById("loginCard");
const adminContent = document.getElementById("adminContent");
const loginStatus = document.getElementById("loginStatus");
const adminList = document.getElementById("adminList");
const saveButton = document.getElementById("saveButton");
const statusMessage = document.getElementById("statusMessage");

const reservationNoticeDaysInput = document.getElementById("reservationNoticeDays");
const displayMonthsInput = document.getElementById("displayMonths");
const startTimeInput = document.getElementById("startTime");
const endTimeInput = document.getElementById("endTime");
const intervalMinutesInput = document.getElementById("intervalMinutes");

function pad(n){return String(n).padStart(2,"0")}
function formatKey(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}
function formatLabel(d){return `${d.getMonth()+1}月${d.getDate()}日（${["日","月","火","水","木","金","土"][d.getDay()]}）`}
function getDatesForMonths(monthCount){
  const t = new Date();
  const s = new Date(t.getFullYear(), t.getMonth(), 1);
  const e = new Date(t.getFullYear(), t.getMonth() + Number(monthCount || 2), 0);
  const a = [];
  const c = new Date(s);
  while(c <= e){ a.push(new Date(c)); c.setDate(c.getDate()+1); }
  return a;
}

function timeToMinutes(time){
  const [h,m]=time.split(":").map(Number);
  return h*60+m;
}

function minutesToTime(minutes){
  return `${String(Math.floor(minutes/60)).padStart(2,"0")}:${String(minutes%60).padStart(2,"0")}`;
}

function generateDefaultTimes(){
  const start = timeToMinutes(settings.startTime || DEFAULT_SETTINGS.startTime);
  const end = timeToMinutes(settings.endTime || DEFAULT_SETTINGS.endTime);
  const interval = Number(settings.intervalMinutes || DEFAULT_SETTINGS.intervalMinutes);
  const times = [];
  for(let current=start; current<=end; current+=interval){
    times.push(minutesToTime(current));
  }
  return times;
}

async function loadSettings(){
  try{
    const snap = await getDoc(doc(db,"settings","booking"));
    if(snap.exists()) settings = { ...DEFAULT_SETTINGS, ...snap.data() };
  } catch(e) {
    console.error(e);
  }

  reservationNoticeDaysInput.value = settings.reservationNoticeDays;
  displayMonthsInput.value = settings.displayMonths;
  startTimeInput.value = settings.startTime;
  endTimeInput.value = settings.endTime;
  intervalMinutesInput.value = settings.intervalMinutes;
}

function readSettingsFromForm(){
  return {
    reservationNoticeDays: Number(reservationNoticeDaysInput.value || 2),
    displayMonths: Number(displayMonthsInput.value || 2),
    startTime: startTimeInput.value || "15:00",
    endTime: endTimeInput.value || "19:00",
    intervalMinutes: Number(intervalMinutesInput.value || 60)
  };
}

async function getDayData(key){
  try{
    const snap=await getDoc(doc(db,"availability",key));
    if(snap.exists()) return snap.data();
  }catch(e){ console.error(e); }
  return {status:"available",times:generateDefaultTimes()};
}

async function renderAdmin(){
  statusMessage.textContent = "読み込み中...";
  settings = readSettingsFromForm();
  adminList.innerHTML = "";
  const defaultTimes = generateDefaultTimes();

  for(const date of getDatesForMonths(settings.displayMonths)){
    const key = formatKey(date);
    const data = await getDayData(key);
    const isClosed = data.status === "unavailable";
    const selected = data.times || defaultTimes;
    const block = document.createElement("div");
    block.className = `day-block ${isClosed ? "closed" : ""}`;
    block.dataset.date = key;

    block.innerHTML = `
      <div class="day-header">
        <div><div class="day-title">${formatLabel(date)}</div><div class="date-key">${key}</div></div>
        <label class="closed-toggle"><input type="checkbox" class="closed-input" ${isClosed ? "checked" : ""}>休み</label>
      </div>
      <div class="time-grid">
        ${defaultTimes.map(t=>`<label class="time-check"><input type="checkbox" value="${t}" ${selected.includes(t) ? "checked" : ""}><span>${t}</span></label>`).join("")}
      </div>`;

    const closedInput = block.querySelector(".closed-input");
    closedInput.addEventListener("change",()=>block.classList.toggle("closed",closedInput.checked));
    adminList.appendChild(block);
  }

  statusMessage.textContent = "";
}

async function saveAll(){
  saveButton.disabled = true;
  statusMessage.textContent = "保存中...";

  try{
    const user = auth.currentUser;
    if(!user || user.email !== ADMIN_EMAIL) throw new Error("管理者としてログインしていません。");

    settings = readSettingsFromForm();
    await setDoc(doc(db,"settings","booking"), {
      ...settings,
      updatedAt: new Date().toISOString(),
      updatedBy: user.email
    });

    const batch = writeBatch(db);
    [...document.querySelectorAll(".day-block")].forEach(block=>{
      const key = block.dataset.date;
      const isClosed = block.querySelector(".closed-input").checked;
      const checked = [...block.querySelectorAll(".time-check input:checked")].map(i=>i.value);
      const status = isClosed || checked.length === 0 ? "unavailable" : "available";

      batch.set(doc(db,"availability",key), {
        status,
        times: status === "available" ? checked : [],
        updatedAt: new Date().toISOString(),
        updatedBy: user.email
      });
    });

    await batch.commit();
    statusMessage.textContent = "保存しました。予約ページを確認してください。";
  }catch(e){
    console.error(e);
    statusMessage.textContent = "保存できませんでした。ログインまたはFirestoreルールを確認してください。";
  }finally{
    saveButton.disabled = false;
  }
}

document.getElementById("popupLoginButton").addEventListener("click",async()=>{
  loginStatus.textContent = "Googleログイン中...";
  try{ await signInWithPopup(auth,provider); }
  catch(e){ loginStatus.textContent = "Popupログイン失敗。下のボタンを試してください。"; console.error(e); }
});

document.getElementById("redirectLoginButton").addEventListener("click",async()=>{
  loginStatus.textContent = "Googleログインへ移動します...";
  try{ await signInWithRedirect(auth,provider); }
  catch(e){ loginStatus.textContent = "Redirectログイン開始でエラー。"; console.error(e); }
});

document.getElementById("logoutButton").addEventListener("click",()=>signOut(auth));
saveButton.addEventListener("click",saveAll);

displayMonthsInput.addEventListener("change", renderAdmin);
startTimeInput.addEventListener("change", renderAdmin);
endTimeInput.addEventListener("change", renderAdmin);
intervalMinutesInput.addEventListener("change", renderAdmin);

getRedirectResult(auth).catch(console.error);

onAuthStateChanged(auth,async user=>{
  if(!user){
    loginCard.classList.remove("hidden");
    adminContent.classList.add("hidden");
    return;
  }

  if(user.email !== ADMIN_EMAIL){
    loginCard.classList.remove("hidden");
    adminContent.classList.add("hidden");
    loginStatus.textContent = `${user.email} は管理者として許可されていません。`;
    return;
  }

  loginCard.classList.add("hidden");
  adminContent.classList.remove("hidden");
  await loadSettings();
  await renderAdmin();
});
</script>
</body>
</html>
