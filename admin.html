<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tao Reserve 管理画面 Debug</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .admin-page{width:min(100%,680px)}
    .login-card,.debug-card{background:rgba(255,255,255,.94);border:1px solid rgba(90,80,68,.08);border-radius:24px;box-shadow:0 10px 32px rgba(70,55,35,.08);padding:18px;margin-bottom:16px}
    .month-title{font-size:20px;margin:0 0 14px;font-weight:500}
    .debug-log{white-space:pre-wrap;background:#fffdf9;border:1px solid #e5dbcf;border-radius:16px;padding:12px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;line-height:1.55;color:#38332d;max-height:320px;overflow:auto}
    .mini-button{border:0;border-radius:999px;background:#f0ebe3;color:#3c3833;padding:10px 14px;font:inherit;font-size:13px;margin-top:10px}
  </style>
</head>
<body>
<main class="page admin-page">
  <section class="hero">
    <p class="label">Tao Reserve</p>
    <h1>管理画面</h1>
    <p class="message">Debug版。ログイン失敗の原因を表示します。</p>
  </section>

  <section id="loginCard" class="login-card">
    <h2 class="month-title">管理者ログイン</h2>
    <p class="message">Googleアカウントでログインしてください。</p>
    <button id="loginButton" class="primary-button" type="button">Googleでログイン</button>
    <p id="loginStatus" class="status-message"></p>
  </section>

  <section class="debug-card">
    <h2 class="month-title">デバッグログ</h2>
    <div id="debugLog" class="debug-log">起動中...</div>
    <button id="copyDebugButton" class="mini-button" type="button">ログをコピー</button>
  </section>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { getFirestore } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
import { firebaseConfig, ADMIN_EMAIL } from "./firebase-config.js";

const debugLog = document.getElementById("debugLog");
const loginButton = document.getElementById("loginButton");
const loginStatus = document.getElementById("loginStatus");
let logs = [];

function addLog(label, value = "") {
  const time = new Date().toLocaleTimeString();
  let text = `[${time}] ${label}`;
  if (value) text += `\n${value}`;
  logs.push(text);
  debugLog.textContent = logs.join("\n\n");
}

function errorText(error) {
  if (!error) return "unknown error";
  return [
    `name: ${error.name || ""}`,
    `code: ${error.code || ""}`,
    `message: ${error.message || ""}`,
    `customData: ${JSON.stringify(error.customData || {}, null, 2)}`
  ].join("\n");
}

addLog("ページ読み込みOK", location.href);
addLog("Firebase設定確認", `projectId: ${firebaseConfig.projectId}\nauthDomain: ${firebaseConfig.authDomain}\nadmin: ${ADMIN_EMAIL}`);

let app, auth, provider;

try {
  app = initializeApp(firebaseConfig);
  addLog("Firebase初期化OK");
  auth = getAuth(app);
  addLog("Auth取得OK");
  getFirestore(app);
  addLog("Firestore取得OK");
  provider = new GoogleAuthProvider();
  provider.setCustomParameters({ prompt: "select_account" });
  addLog("GoogleAuthProvider作成OK");
} catch (error) {
  addLog("初期化エラー", errorText(error));
}

loginButton.addEventListener("click", async () => {
  loginStatus.textContent = "Googleログインへ移動します...";
  addLog("ログインボタン押下");
  try {
    addLog("signInWithRedirect開始");
    await signInWithRedirect(auth, provider);
    addLog("signInWithRedirect呼び出し後");
  } catch (error) {
    loginStatus.textContent = "ログイン開始でエラーが出ました。";
    addLog("ログイン開始エラー", errorText(error));
  }
});

getRedirectResult(auth).then((result) => {
  if (result && result.user) {
    addLog("Redirect結果取得OK", `email: ${result.user.email}`);
  } else {
    addLog("Redirect結果なし", "通常表示または未ログイン状態");
  }
}).catch((error) => {
  loginStatus.textContent = "ログイン処理でエラーが出ました。";
  addLog("Redirect結果取得エラー", errorText(error));
});

onAuthStateChanged(auth, (user) => {
  addLog("Auth状態変更", user ? `email: ${user.email}` : "未ログイン");
  if (user && user.email === ADMIN_EMAIL) {
    loginStatus.textContent = "管理者ログイン成功です。";
  }
});

document.getElementById("copyDebugButton").addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(debugLog.textContent);
    addLog("ログコピーOK");
  } catch (error) {
    addLog("ログコピー失敗", errorText(error));
  }
});
</script>
</body>
</html>
