<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tao Reserve 管理画面</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Zen Kaku Gothic New", system-ui, -apple-system, BlinkMacSystemFont, sans-serif; background: #faf7f1; color: #2f2f2f; }
    .page { width: min(100%, 680px); margin: 0 auto; padding: 36px 16px 72px; }
    .hero { text-align: center; padding: 24px 8px 26px; }
    .label { margin: 0 0 8px; font-size: 14px; letter-spacing: 0.12em; color: #6f6a62; }
    h1 { margin: 0; font-size: 30px; font-weight: 500; letter-spacing: 0.06em; }
    .message { margin: 18px 0 0; line-height: 1.8; color: #5b554d; font-size: 15px; }
    .card { background: rgba(255,255,255,.94); border: 1px solid rgba(90,80,68,.08); border-radius: 24px; box-shadow: 0 10px 32px rgba(70,55,35,.08); padding: 18px; margin-bottom: 16px; }
    .month-title { font-size: 20px; margin: 0 0 14px; font-weight: 500; }
    .day-block { border-top: 1px solid #eee6dc; padding: 16px 0; }
    .day-block:first-of-type { border-top: none; }
    .day-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 12px; }
    .day-title { font-size: 17px; font-weight: 500; }
    .date-key { margin-top: 3px; color: #8a8175; font-size: 12px; }
    .closed-toggle { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; color: #6f6a62; white-space: nowrap; }
    .time-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .time-check { position: relative; }
    .time-check input { position: absolute; opacity: 0; }
    .time-check span { display: block; text-align: center; padding: 11px 6px; border-radius: 999px; background: #f0ebe3; color: #6f6a62; font-size: 14px; border: 1px solid transparent; }
    .time-check input:checked + span { background: #eef5ef; color: #244c32; border-color: rgba(46,104,65,.18); font-weight: 500; }
    .day-block.closed .time-grid { opacity: .35; pointer-events: none; }
    .actions { position: sticky; bottom: 0; background: linear-gradient(to top, #faf7f1 70%, rgba(250,247,241,0)); padding: 22px 0 0; margin-top: 12px; }
    .button { width: 100%; border: none; border-radius: 999px; padding: 15px 18px; font: inherit; font-weight: 500; letter-spacing: .05em; background: #2f5f3f; color: white; }
    .note { margin: 10px 0 0; color: #6f6a62; font-size: 13px; line-height: 1.7; }
    .status { text-align: center; margin-top: 12px; color: #6f6a62; font-size: 14px; }
    @media (max-width: 420px) { .time-grid { grid-template-columns: repeat(3, 1fr); } }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="label">Tao Reserve</p>
      <h1>管理画面</h1>
      <p class="message">予約できる日と時間を選んで、<br>Firebaseに保存します。</p>
    </section>
    <section class="card">
      <h2 class="month-title">今月・来月の受付設定</h2>
      <p class="note">休みにしたい日は「休み」にチェック。17時以降だけ受けたい日は15時・16時を外してください。</p>
      <div id="adminList"></div>
    </section>
    <div class="actions">
      <button class="button" id="saveButton" type="button">Firebaseに保存する</button>
      <p id="statusMessage" class="status"></p>
    </div>
  </main>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getFirestore, doc, getDoc, writeBatch } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
    import { firebaseConfig } from "./firebase-config.js";
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const DEFAULT_TIMES = ["15:00", "16:00", "17:00", "18:00", "19:00"];
    const adminList = document.getElementById("adminList");
    const saveButton = document.getElementById("saveButton");
    const statusMessage = document.getElementById("statusMessage");
    function pad(number) { return String(number).padStart(2, "0"); }
    function formatKey(date) { return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`; }
    function formatLabel(date) { const weekdays = ["日", "月", "火", "水", "木", "金", "土"]; return `${date.getMonth() + 1}月${date.getDate()}日（${weekdays[date.getDay()]}）`; }
    function getDatesForTwoMonths() { const today = new Date(); const start = new Date(today.getFullYear(), today.getMonth(), 1); const end = new Date(today.getFullYear(), today.getMonth() + 2, 0); const dates = []; const cursor = new Date(start); while (cursor <= end) { dates.push(new Date(cursor)); cursor.setDate(cursor.getDate() + 1); } return dates; }
    async function getDayData(key) { try { const snapshot = await getDoc(doc(db, "availability", key)); if (snapshot.exists()) return snapshot.data(); } catch (error) { console.error("読み込みエラー:", error); } return { status: "available", times: DEFAULT_TIMES }; }
    async function renderAdmin() {
      statusMessage.textContent = "読み込み中..."; adminList.innerHTML = "";
      for (const date of getDatesForTwoMonths()) {
        const key = formatKey(date); const data = await getDayData(key); const isClosed = data.status === "unavailable"; const selectedTimes = data.times || [];
        const block = document.createElement("div"); block.className = `day-block ${isClosed ? "closed" : ""}`; block.dataset.date = key;
        const timeChecks = DEFAULT_TIMES.map((time) => `<label class="time-check"><input type="checkbox" value="${time}" ${selectedTimes.includes(time) ? "checked" : ""}><span>${time}</span></label>`).join("");
        block.innerHTML = `<div class="day-header"><div><div class="day-title">${formatLabel(date)}</div><div class="date-key">${key}</div></div><label class="closed-toggle"><input type="checkbox" class="closed-input" ${isClosed ? "checked" : ""}>休み</label></div><div class="time-grid">${timeChecks}</div>`;
        const closedInput = block.querySelector(".closed-input"); closedInput.addEventListener("change", () => block.classList.toggle("closed", closedInput.checked));
        adminList.appendChild(block);
      }
      statusMessage.textContent = "";
    }
    async function saveAvailability() {
      saveButton.disabled = true; statusMessage.textContent = "保存中...";
      try {
        const batch = writeBatch(db);
        document.querySelectorAll(".day-block").forEach((block) => {
          const key = block.dataset.date;
          const isClosed = block.querySelector(".closed-input").checked;
          const checkedTimes = [...block.querySelectorAll(".time-check input:checked")].map((input) => input.value);
          const status = isClosed || checkedTimes.length === 0 ? "unavailable" : "available";
          const times = status === "available" ? checkedTimes : [];
          batch.set(doc(db, "availability", key), { status, times, updatedAt: new Date().toISOString() });
        });
        await batch.commit(); statusMessage.textContent = "保存しました。予約ページを確認してください。";
      } catch (error) { console.error("保存エラー:", error); statusMessage.textContent = "保存できませんでした。Firestoreルールを確認してください。"; }
      finally { saveButton.disabled = false; }
    }
    saveButton.addEventListener("click", saveAvailability);
    renderAdmin();
  </script>
</body>
</html>
